mode: dry_run  # dry_run | paper | live
initial_bankroll: 1000.0  # dry_run test bankroll (no real money)

cycle:
  default_interval_min: 30
  breaking_news_interval_min: 10
  near_stop_loss_interval_min: 15
  night_interval_min: 60
  night_hours: [8, 9, 10, 11, 12, 13]  # UTC 08-13 = US midnight-8am (no games)

scanner:
  min_liquidity: 1000
  tags: []  # Empty = accept all categories (sports resolve fast → quicker test data)
  prefer_short_duration: true  # Prioritize markets resolving within 48h
  max_markets_per_cycle: 300  # Fetch more per tag to catch esports + lower volume sports
  max_duration_days: 14  # Skip markets resolving more than 14 days out (test calibration)
  allowed_categories: ["sports"]  # Esports disabled (0W/5L, -$21) — re-enable with damage-ladder exit strategy

ai:
  model: "claude-sonnet-4-20250514"
  max_tokens: 1024
  cache_ttl_min: 120  # 2 hour cache — don't re-analyze same market within 2h
  cache_invalidate_price_move_pct: 0.05
  batch_size: 20  # Analyze more markets per cycle for better selection
  monthly_budget_usd: 48.0
  sprint_budget_usd: 24.0

edge:
  min_edge: 0.05
  confidence_multipliers:
    C: 1.5
    B-: 1.0
    B+: 0.85
    A: 0.75

risk:
  kelly_fraction: 0.25  # Quarter Kelly — 75% less risk, 75% of growth rate
  max_single_bet_usdc: 75
  max_bet_pct: 0.05  # Max 5% of bankroll = $50 (dry_run $1000)
  max_positions: 20  # Normal slots = max_positions - vs reserved_slots (20-5=15)
  correlation_cap_pct: 0.30
  stop_loss_pct: 0.30
  take_profit_pct: 0.40
  consecutive_loss_cooldown: 3
  cooldown_cycles: 2


volatility_swing:
  enabled: true
  reserved_slots: 5  # 5 VS slots
  max_concurrent: 5
  stop_loss_pct: 0.20
  take_profit_pct: 0.60
  max_token_price: 0.50
  min_token_price: 0.10
  max_hours_to_start: 24.0
  bet_pct: 0.05
  polling_interval_min: 5

early:
  enabled: true
  max_slots: 4                    # 4 dedicated early entry slots (swing trade + penny alpha)
  max_entry_price: 0.70           # Max token price for early entry
  min_edge: 0.10                  # 10% min edge for early entry
  min_ai_probability: 0.55        # AI must be ≥55% confident
  min_confidence: "B-"            # B- minimum
  bookmaker_pre_screen_edge: 0.08 # Bookmaker must show ≥8% edge vs market
  min_hours_to_start: 6.0         # Only markets >6h qualify as early entry
  max_hours_to_start: 336.0       # 14 days max
  bet_pct: 0.05                   # 5% bankroll per early entry bet
  stop_loss_pct: 0.30
  take_profit_pct: 0.40           # Normal swing TP
  penny_max_price: 0.02           # $0.01-$0.02 = penny zone
  penny_1c_target_multiplier: 5.0 # $0.01 → hold for 5x ($0.05)
  penny_2c_target_multiplier: 2.0 # $0.02 → hold for 2x ($0.04)
  penny_bet_pct: 0.05             # 5% bankroll for penny (high sizing — near-guaranteed)

consensus_entry:
  enabled: true
  min_price: 0.65       # Both AI and market ≥65% same direction — agreement signal
  bet_pct: 0.05         # 5% fixed (no Kelly — edge≈0, stop-loss asymmetry is the edge)
  max_slots: 5          # Max concurrent consensus positions

bond_farming:
  bet_pct: 0.08
  max_total_bond_pct: 0.20
  max_days_to_resolution: 0.25

notifications:
  telegram_enabled: true

dashboard:
  host: "127.0.0.1"
  port: 5050

logging:
  trades_file: "logs/trades.jsonl"
  portfolio_file: "logs/portfolio.jsonl"
  performance_file: "logs/performance.jsonl"
