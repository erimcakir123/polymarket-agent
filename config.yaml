# config.yaml — Polymarket Agent 2.0 v2 defaults (TDD §9)
mode: dry_run  # dry_run | paper | live
initial_bankroll: 1000.0

cycle:
  heavy_interval_min: 30
  light_interval_sec: 5

scanner:
  min_liquidity: 1000
  max_markets_per_cycle: 300
  max_duration_days: 14
  # Maç bu kadar saatten uzaksa Odds API h2h verisi yok → scanner'da ele
  max_hours_to_start: 24.0
  # yes_price >= bu veya <= (1 - bu) → market sonucu belli, skip (Polymarket flag lag)
  resolved_price_threshold: 0.98
  allowed_categories: ["sports"]
  # Gamma event.tags[*].slug formatı (Odds API key ≠ Gamma tag).
  # Odds API mapping domain/matching/odds_sport_keys.py'de ayrı yapılır.
  allowed_sport_tags:
    # Baseball
    - mlb
    - milb
    - npb
    - kbo
    - baseball
    # Basketball
    - nba
    - wnba
    - ncaab
    - cbb
    - wncaab
    - euroleague
    - nbl
    # "basketball" generic dropped: CBA/KBL/VTB no Odds API coverage (SPEC-003)
    # Ice Hockey
    - nhl
    - ahl
    - liiga
    - mestis
    - shl
    - allsvenskan
    # "hockey" generic dropped: KHL no Odds API coverage (SPEC-003)
    # American Football (NFL regular season OT-tie %0.2 — TODO-001, MVP'de NFL dışarıda)
    - ncaaf
    - cfl
    - ufl
    # Tennis (wildcard — turnuva bazlı dinamik)
    - tennis
    - "atp*"
    - "wta*"
    # Combat sports (2-outcome, draw yok — mevcut pipeline uyumlu)
    - mma
    - ufc
    - boxing
    # Golf (H2H)
    - "lpga*"
    - "liv*"
    - "pga*"
    # Cricket (SPEC-011) — 7 ligi + Polymarket tag'leri
    - cricket
    - cricket_ipl
    - cricket_odi
    - cricket_international_t20
    - cricket_psl
    - cricket_big_bash
    - cricket_caribbean_premier_league
    - cricket_t20_blast
    - indian-premier-league
    - international-cricket
    # Soccer (SPEC-015) — 3-way support, TODO-001 defer kaldirildi
    - soccer
    - epl
    - premier-league
    - la-liga
    - la-liga-2
    - bundesliga
    - serie-a
    - ligue-1
    - champions-league
    - europa-league
    - conference-league
    - mls
    - eredivisie
    - primeira-liga
    - super-lig
    - brasileirao
    - argentine-primera-division
    - liga-mx
    - scottish-premiership
    - belgian-pro-league
    - danish-superliga
    - eliteserien
    - allsvenskan
    - greek-super-league
    - austrian-bundesliga
    - russian-premier-league
    - saudi-professional-league
    - k-league
    - j1-league
    - a-league
    - chinese-super-league
    - thai-league
    - indian-super-league
    - egyptian-premier-league
    - polish-ekstraklasa
    - czech-first-league
    - romanian-liga-i
    - ukrainian-premier-league
    - croatian-football-league
    - colombian-primera-a
    - peruvian-liga-1
    - uruguayan-primera-division
    - ecuadorian-ligapro
    - fa-cup
    - efl-cup
    - dfb-pokal
    - copa-del-rey
    - coppa-italia
    - coupe-de-france
    - copa-libertadores
    - copa-sudamericana
    - nwsl
    # Rugby (SPEC-015 3-way ayni altyapi)
    - rugby
    - rugby-union
    - rugby-league
    - six-nations
    - premiership-rugby
    - nrl
    # AFL (SPEC-015 3-way)
    - afl
    # Handball (SPEC-015 3-way)
    - handball

risk:
  max_single_bet_usdc: 75           # SPEC-016 probability-weighted: efektif tavan ~$56 ($75×0.75), A-conf güçlü favorilerde $50+ bet'e alan verir
  max_bet_pct: 0.05
  confidence_bet_pct:
    A: 0.05
    B: 0.04
  max_positions: 50        # Kozmetik cap — pratikte exposure_pct + bet_pct dominant (~12-15 aktif poz)
  max_exposure_pct: 0.50
  hard_cap_overflow_pct: 0.02   # soft cap üstüne +%2 buffer (hard cap = %52)
  min_entry_size_pct: 0.015     # min pozisyon = bankroll × %1.5 (tx-cost floor)
  consecutive_loss_cooldown: 3
  cooldown_cycles: 2
  probability_weighted: true  # SPEC-016: stake win_prob ile çarpılır (false = eski davranış)

entry:
  min_favorite_probability: 0.60   # SPEC-017: bookmaker güçlü favori eşiği (tek gerçek filtre)
  max_entry_price: 0.80            # SPEC-017: pahalı outlier cap (R/R koruma). Alt taban YOK — undervalue girişlere açık.
  # PLAN-013: bookmaker kalite filtresi — az sample'lı maçlarda güven düşük
  min_bookmakers: 15               # gerçek bookmaker sayısı (weight değil)
  min_sharps: 3                    # sharp book sayısı (Pinnacle/Smarkets/Betfair/Matchbook)
  active_sports: []

stock:
  enabled: true
  jit_batch_multiplier: 3       # empty_slots × bu = her cycle enrich edilecek tavan
  ttl_hours: 24.0               # first_seen üzerinden stock'ta kalma limiti
  pre_match_cutoff_min: 30.0    # match_start'a bu dk kala düş
  max_stale_attempts: 3         # peş peşe bu kadar skip → düş

scale_out:
  enabled: true
  # SPEC-013: threshold = entry ile 0.99 arasindaki mesafenin fraction'i
  # 0.50 = yari yol (43c entry -> 71c tetik; 70c entry -> 84.5c tetik)
  tiers:
    - threshold: 0.50    # SPEC-013: midpoint to resolution (eski: 0.15 PnL%)
      sell_pct: 0.40
  # PLAN-014b: küçük bet'lerde TP1 $1-2 saçmalığını engelle — realized kazanç bu eşiğin altındaysa tetikleme
  min_realized_usd: 5.0

circuit_breaker:
  daily_max_loss_pct: -0.08
  hourly_max_loss_pct: -0.05
  consecutive_loss_limit: 4
  cooldown_after_daily_min: 120
  cooldown_after_hourly_min: 60
  cooldown_after_consecutive_min: 60
  entry_block_threshold: -0.03
  # Dashboard Loss Protection renk bölgeleri (drawdown %)
  safe_drawdown_pct: 15.0
  warn_drawdown_pct: 30.0

manipulation:
  min_liquidity_usd: 10000

liquidity:
  entry_min_depth_usdc: 100
  entry_halve_threshold: 0.20
  exit_min_fill_ratio: 0.80

near_resolve:
  threshold_cents: 94
  pre_match_guard_minutes: 10   # WS spike guard — ilk 10dk'da 94¢ sinyali gerçek değil, spike

market_flip:
  min_entry_price: 0.60
  market_flip_threshold: 0.50
  market_flip_elapsed_gate: 0.85

exit_monitor:
  # Never-in-profit guard (TDD §6.10)
  never_in_profit_elapsed_gate: 0.70   # maç bu kadar ilerlemediyse fire etmez
  never_in_profit_recovery_ratio: 0.90  # current >= entry * bu → fire etmez
  never_in_profit_drop_ratio: 0.75      # current < entry * bu → fire eder
  # Ultra-low guard (TDD §6.12)
  ultra_low_entry_cap: 0.09    # entry < bu → ultra-low zone
  ultra_low_elapsed_gate: 0.75  # elapsed bu veya üstü gerekir
  ultra_low_current_cap: 0.05  # current < bu → exit
  # Hold-revocation guard (TDD §6.14)
  hold_anchor_prob_gate: 0.65   # anchor_probability >= bu → hold candidate
  hold_dip_min_cycles: 3
  hold_dip_min_drop: 0.05
  hold_ever_profit_price_ratio: 0.70
  hold_ever_profit_elapsed_gate: 0.60
  hold_no_profit_price_ratio: 0.75
  hold_no_profit_elapsed_gate: 0.70

# PLAN-014: dolar-bazlı stop loss (sport-agnostic, skor bağımsız)
sl:
  enabled: true
  price_below: 0.50             # [2-way] Bid 50c altindaysa (karsi taraf > 0.50)
  max_loss_usd: 12.0            # -$12.00 barajindan sonra SL active
  min_elapsed_pct: 0.75         # Macin %75'i tamamlanmadan SL CALISMAZ (Plans 22/23)

score:
  enabled: true
  poll_normal_sec: 60
  poll_critical_sec: 30
  critical_price_threshold: 0.35
  match_window_hours: 4       # maç saati ± bu süre dışında skor çekilmez
  # PLAN-012: soccer runtime league discovery
  espn_leagues_cache_ttl_hours: 24
  soccer_discovery_max_candidates: 12

favored:
  promote_eff_price: 0.65
  demote_eff_price: 0.65
  conf_required: ["A", "B"]

dashboard:
  enabled: true
  host: "127.0.0.1"
  port: 5050

telegram:
  enabled: false
  bot_token: ""
  chat_id: ""

# Cricket cluster (SPEC-011)
cricket:
  enabled: true
  daily_limit: 100       # CricAPI free tier; TODO-003 paid tier 1000
  cache_ttl_sec: 240     # 4dk bulk cache
  timeout_sec: 15        # HTTP timeout

# Odds API daily credit hard cap (SPEC-015)
odds_api:
  daily_credit_cap: 800  # SPEC-015: günlük hard cap (soccer 60+ lig budget koruma)
